<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vote{% endblock %}</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    {% block nav %}
    <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
        <div class="container-fluid px-3 px-lg-4">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
                <span class="brand-mark">V</span>
                <span class="d-grid lh-sm">
                    <strong class="brand-title">Vote</strong>
                    <small class="brand-subtitle">Live classroom polling</small>
                </span>
            </a>

            <div class="navbar-nav flex-row gap-2 ms-auto">
                <a class="nav-link nav-pill" href="{{ url_for('index') }}">Participant</a>
                <a class="nav-link nav-pill" href="{{ url_for('admin') }}">Admin</a>
            </div>
        </div>
    </nav>
    {% endblock %}

    <main class="container-fluid app-shell py-3 py-lg-4" data-app>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</body>

</html>
