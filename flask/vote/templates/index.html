{% extends "base.html" %}

{% block title %}Quiz temporizado{% endblock %}

{% block nav %}{% endblock %}

{% block content %}
<section
    class="quiz-page"
    data-role="participant"
    data-state-url="{{ url_for('api_state') }}"
    data-advance-url="{{ url_for('api_advance_quiz') }}"
>
    <div id="participant-state" class="quiz-stage" aria-live="polite">
        <div class="quiz-empty-state" role="status">
            Carregando quiz...
        </div>
    </div>
</section>
{% endblock %}
